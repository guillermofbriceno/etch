name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend tests & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/etch-gui

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/etch-gui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm check

  rust-unit:
    name: Rust unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            libasound2-dev \
            libopus-dev \
            libsecret-1-dev \
            libdbus-1-dev \
            protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93'

      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test -p etch-core
        env:
          RUST_BACKTRACE: 1

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**'
              - '!client/etch-gui/**'
              - '!**/*.md'
              - '!.github/**'

  rust-integration:
    name: Rust integration tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            libasound2-dev \
            libopus-dev \
            libsecret-1-dev \
            libdbus-1-dev \
            protobuf-compiler \
            python3-requests

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93'

      - uses: Swatinem/rust-cache@v2

      - name: Run integration tests
        run: bash tests/integration/run.sh
        env:
          RUST_BACKTRACE: 1
